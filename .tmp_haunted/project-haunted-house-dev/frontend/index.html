<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Ghost Collector - Main Menu</title>
</head>
<body>
<div id="pre-start-screen">
    <img src="images/result.png" class="full-bg" style="filter: brightness(0.3);">

    <div class="intro-container">
        <div class="npc-side">
            <img src="images/npc1.png" class="ghost-npc">
        </div>

        <div class="content-side">
            <div class="speech-bubble">
                <div id="typewriter-text" class="bubble-text">
                    "ยินดีต้อนรับสู่บ้านหลังนี้... ภารกิจของเจ้าคือรวบรวมไอเท็มทั้งหมดเพื่อปลดปล่อยพวกเรา ระวังให้ดีล่ะ หากเจ้าให้ของผิดคน... วิญญาณจะไม่ได้รับการปลดปล่อย"
                </div>
            </div>

            <div class="signboard">
                <div class="sign-title">ด่านเกมบ้านผีสิง</div>
                <div class="sign-subtitle">จงรวบรวมความกล้าเพื่อปลดปล่อยวิญญาณ...</div>
                <button class="start-game-btn" onclick="enterGame()">เริ่มเกม</button>
            </div>
        </div>
    </div>
</div>
            
        </div>
    </div>
</div>
    <div class="container" id="main-menu-container" style="display: none;">
        <img src="images/main_menu.png" class="full-bg">

        <div class="main-logo-header">
            <img src="images/game_logo.png" alt="Logo" class="main-logo">
        </div>

        <div class="sign-wrapper pos-living" onclick="selectRoom(0)">
            <img src="images/living_sign.png" id="sign-0" class="menu-sign">
        </div>

        <div class="sign-wrapper pos-bathroom">
            <img src="images/bathroom_sign.png" id="sign-1" class="menu-sign locked">
        </div>

        <div class="sign-wrapper pos-bedroom">
            <img src="images/bedroom_sign.png" id="sign-2" class="menu-sign locked">
        </div>

        <div class="sign-wrapper pos-kid">
            <img src="images/kid_sign.png" id="sign-3" class="menu-sign locked">
        </div>
    </div>

    <script>
        // ล้างข้อมูลการเล่นเก่าเมื่อกลับมาหน้าเมนู
        localStorage.clear();
        sessionStorage.removeItem('bgm_currentTime');

        function enterGame() {
            // ปลดล็อกระบบเสียง Browser
            const unlockAudio = new Audio('sounds/room_bgm.mp3');
            unlockAudio.volume = 0;
            unlockAudio.play().then(() => {
                unlockAudio.pause();
                showMainMenu();
            }).catch(() => {
                showMainMenu();
            });
        }

        function showMainMenu() {
            document.getElementById('pre-start-screen').style.display = 'none';
            document.getElementById('main-menu-container').style.display = 'block';
        }

        // ฟังก์ชันหลักในการเลือกห้อง
        function selectRoom(id) {
            // ตรวจสอบว่าป้ายที่กดไม่ใช่ป้ายที่ติด Class 'locked'
            const sign = document.getElementById(`sign-${id}`);
            
            if (sign && sign.classList.contains('locked')) {
                return; // ถ้าล็อกอยู่ไม่ต้องทำงานต่อ
            }

            // เล่นเสียงคลิกไม้
            new Audio('sounds/pickup.mp3').play();

            // ใส่แอนิเมชันสั่นเรืองแสง (ต้องตรงกับชื่อใน style.css)
            if (sign) {
                sign.classList.add('sign-active');
            }

            // หน่วงเวลาให้แอนิเมชันเล่นจบก่อนเปลี่ยนหน้า
            setTimeout(() => {
                // เชื่อมต่อไปยัง room.html พร้อมส่ง ID ห้องไปทาง URL
                window.location.href = `room.html?id=${id}`;
            }, 600);
        }

document.addEventListener('DOMContentLoaded', () => {
        const textElement = document.getElementById('typewriter-text');
        const message = textElement.innerHTML.trim();
        textElement.innerHTML = '';
        let i = 0;

        // --- เพิ่มส่วนระบบเสียง ---
        // สร้าง Object เสียง (ใส่ path ไฟล์เสียงที่คุณไปเจนมา)
        const voice = new Audio('sounds/npc_voice.mp3'); 
        voice.volume = 0.7;

        function typeWriter() {
            if (i < message.length) {
                textElement.innerHTML += message.charAt(i);
                i++;
                setTimeout(typeWriter, 90); 
            }
        }
        
        // ฟังก์ชันเริ่มการทำงาน
        function startIntro() {
            // เล่นเสียงพากย์
            voice.play().catch(e => console.log("User must interact first"));
            // เริ่มพิมพ์ข้อความ
            typeWriter();
        }

        // ในหลาย Browser เสียงจะเล่นไม่ได้จนกว่าจะมีการคลิก
        // เราจะให้เสียงเริ่มเมื่อผู้เล่นคลิกที่ใดก็ได้บนหน้าจอครั้งแรก หรือรอ 0.5 วินาที
        setTimeout(startIntro, 500);
    });
    </script>
</body>
</html>
