<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
</head>
<body class="puzzle-page">
    <div class="container">
        <div id="dialog-box">คลิกที่ผีเพื่อฟังเรื่องราวของพวกเขา...</div>
        <div id="ghost-container"></div>
        
        <div class="hint-bar">
            <h3>นี่คือสิ่งของที่ท่านหามาได้ (ลากไอเท็มไปวางที่ผีเพื่อปลดปล่อย)</h3>
            <div id="inventory-slots" class="item-hints"></div>
        </div>
        
        <button class="result-btn" onclick="window.location.href='result.html'">ดูผลสรุป</button>
    </div>

    <script>
    const inv = JSON.parse(localStorage.getItem('playerInventory')) || [];
    let gameData = null;
    const ghostReceivedItems = {}; 
    
    // ตัวแปรสำหรับเก็บออบเจ็กต์เสียงที่กำลังเล่นอยู่
    let currentGhostAudio = null; 

    fetch('http://localhost:8085/api/data')
        .then(res => res.json())
        .then(data => {
            gameData = data;
            const ghostCont = document.getElementById('ghost-container');
            const invCont = document.getElementById('inventory-slots');

        data.ghosts.forEach(g => {
    // ตรวจสอบว่าถ้า ID คือ 'girl' ให้เพิ่มคลาส 'ghost-girl' เข้าไปด้วย
    const extraClass = (g.id === 'girl') ? 'ghost-girl' : '';

    ghostCont.innerHTML += `
        <div class="ghost-wrapper">
            <img src="images/${g.id}.png" 
            id="ghost-${g.id}" 
                class="ghost-img ${extraClass}" 
                onclick="talk('${g.id}')" 
                ondragover="allow(event)" 
                ondrop="drop(event, '${g.id}')"
                data-unlocked="false">
        </div>`;
    ghostReceivedItems[g.id] = [];
});

            inv.forEach(id => {
                invCont.innerHTML += `<img src="images/${id}.png" id="${id}" class="item-icon found" draggable="true" ondragstart="drag(event)">`;
            });
        });

    // ตัวแปรสำหรับเก็บค่า Timeout ของการพิมพ์ เพื่อใช้หยุดกรณีเปลี่ยนตัวละคร
let typeTimeout = null;

window.talk = (id) => {
    if (!gameData) return;

    // 1. หยุดเสียงเดิมที่กำลังเล่นอยู่
    if (currentGhostAudio) {
        currentGhostAudio.pause();
        currentGhostAudio.currentTime = 0;
    }

    // 2. หยุดการพิมพ์ข้อความเดิมที่ยังพิมพ์ไม่เสร็จ
    if (typeTimeout) {
        clearTimeout(typeTimeout);
    }

    const g = gameData.ghosts.find(x => x.id === id);
    const dialogBox = document.getElementById('dialog-box');

    // 3. เริ่มเล่นเสียงพูด
    currentGhostAudio = new Audio(`sounds/${id}_voice.mp3`);
    currentGhostAudio.play().catch(e => console.log("Audio play blocked"));
    
    // 4. ระบบข้อความพิมพ์ดีด
    let i = 0;
    const fullText = g.story;
    dialogBox.innerText = ""; // ล้างข้อความเก่าออกก่อน

    function typeEffect() {
        if (i < fullText.length) {
            dialogBox.innerText += fullText.charAt(i);
            i++;
            // ปรับความเร็วการพิมพ์ที่เลข 40 (ยิ่งน้อยยิ่งไว)
            typeTimeout = setTimeout(typeEffect, 90); 
        }
    }
    
    typeEffect(); // เริ่มต้นการพิมพ์

    // 5. ปรับแต่งเอฟเฟกต์ภาพผี
    const ghostImg = document.getElementById(`ghost-${id}`);
    ghostImg.dataset.unlocked = "true";
    
    document.querySelectorAll('.ghost-img').forEach(img => img.style.filter = "brightness(0.7)");
    ghostImg.style.filter = "brightness(1.2) drop-shadow(0 0 10px gold)";
};

    window.allow = (e) => e.preventDefault();
    window.drag = (e) => e.dataTransfer.setData("text", e.target.id);

    window.drop = (e, gid) => {
        e.preventDefault();
        const itemId = e.dataTransfer.getData("text");
        const ghostImg = document.getElementById(`ghost-${gid}`);
        const dialogBox = document.getElementById('dialog-box');

        if (ghostImg.dataset.unlocked !== "true") {
            dialogBox.innerText = "คุณต้องคุยกับวิญญาณก่อนจะมอบของให้...";
            return;
        }

        if (ghostReceivedItems[gid].length >= 2) {
            dialogBox.innerText = "วิญญาณตนนี้ไม่สามารถรับอะไรได้เพิ่มอีกแล้ว...";
            return;
        }

        ghostReceivedItems[gid].push(itemId);
        const itemEl = document.getElementById(itemId);
        if (itemEl) itemEl.remove();

        const index = inv.indexOf(itemId);
        if (index > -1) inv.splice(index, 1);

        if (ghostReceivedItems[gid].length === 1) {
            ghostImg.classList.add('ghost-half-faded');
            dialogBox.innerText = "วิญญาณรับไอเท็มชิ้นแรกไปแล้ว... (1/2)";
        } else if (ghostReceivedItems[gid].length === 2) {
            // --- เมื่อผีหายไป ให้หยุดเสียงพูดของตัวนั้นทันที ---
            if (currentGhostAudio) {
                currentGhostAudio.pause();
            }
            
            ghostImg.classList.remove('ghost-half-faded');
            ghostImg.classList.add('fade-out');
            dialogBox.innerText = "ความปรารถนาของฉันเติมเต็มแล้ว... ขอบคุณนะ (2/2)";
        }

        localStorage.setItem('playerInventory', JSON.stringify(inv));
        localStorage.setItem('ghostReceivedItems', JSON.stringify(ghostReceivedItems));

        if (inv.length === 0) {
            setTimeout(() => { window.location.href = 'result.html'; }, 2000);
        }
    };

</script>
</body>
</html>
