<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Ghost Collector - Room</title>
</head>
<body class="room-page">
    <div id="transition-overlay"></div>

    <div class="container" id="game-container">
        <div class="room-header">
            <img id="roomSignImg" src="" alt="Room Sign" class="sign-img">
        </div>
        
        <div id="timer">⏱️ 30</div>
        
        <canvas id="gameCanvas"></canvas>
        
        <div class="hint-bar">
            <div class="hint-text">หาสิ่งของตามนี้เพื่อช่วยผี</div>
            <div id="itemHints" class="item-hints"></div>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const roomId = parseInt(params.get('id')) || 0;
        let roomData;
        let time = 30;
        let timerId;

        // --- 1. ระบบเพลงประกอบต่อเนื่อง (BGM Continuity) ---
        const bgm = new Audio('sounds/room_bgm.mp3');
        bgm.loop = true;
        bgm.volume = 0.3;

        // ดึงเวลาที่เล่นค้างไว้จากด่านก่อน
        const savedTime = sessionStorage.getItem('bgm_currentTime');
        if (savedTime) {
            bgm.currentTime = parseFloat(savedTime);
        }

        // สั่งให้เล่นทันที (จะทำงานได้เพราะเราคลิกปุ่ม Start จากหน้าแรกมาแล้ว)
        bgm.play().catch(() => {
            // สำรองเผื่อโดนบล็อก ให้เล่นเมื่อมีการคลิกครั้งแรกในหน้านี้
            document.addEventListener('click', () => { bgm.play(); }, { once: true });
        });

        // บันทึกเวลาเพลงทุก 0.5 วินาที
        setInterval(() => {
            sessionStorage.setItem('bgm_currentTime', bgm.currentTime);
        }, 500);

        // --- 2. โหลดข้อมูลด่าน ---
        fetch('http://localhost:8085/api/data').then(res => res.json()).then(data => {
            roomData = data.rooms[roomId];
            document.getElementById('roomSignImg').src = `images/${roomData.id}_sign.png`;
            
            const cvs = document.getElementById('gameCanvas');
            const ctx = cvs.getContext('2d');
            const bg = new Image(); 
            bg.src = roomData.bg;

            bg.onload = () => {
                cvs.width = bg.width;
                cvs.height = bg.height;
                ctx.drawImage(bg, 0, 0);
            };
            
            const hintDiv = document.getElementById('itemHints');
            roomData.items.forEach(it => {
                const itemId = (it.id || it.ID).toLowerCase();
                hintDiv.innerHTML += `<img id="hint-${itemId}" src="images/${itemId}.png" class="item-icon missing">`;
            });

            cvs.onclick = (e) => {
                const rect = cvs.getBoundingClientRect();
                const x = ((e.clientX - rect.left) / rect.width) * 100;
                const y = ((e.clientY - rect.top) / rect.height) * 100;

                let hitAnyItem = false;

                roomData.items.forEach(it => {
                    const itemId = (it.id || it.ID).toLowerCase();
                    const itemX = it.X || it.x;
                    const itemY = it.Y || it.y;
                    const itemW = it.W || it.w;
                    const itemH = it.H || it.h;

                    if (x >= itemX && x <= itemX + itemW && y >= itemY && y <= itemY + itemH) {
                        hitAnyItem = true; 
                        let inv = JSON.parse(localStorage.getItem('playerInventory')) || [];
                        if(!inv.includes(itemId)) {
                            // เสียงเก็บของ
                            new Audio('sounds/pickup.mp3').play();
                            
                            inv.push(itemId);
                            localStorage.setItem('playerInventory', JSON.stringify(inv));
                            
                            const hintImg = document.getElementById(`hint-${itemId}`);
                            if (hintImg) {
                                hintImg.classList.remove('missing');
                                hintImg.classList.add('found');
                            }
                            checkRoomComplete();
                        }
                    }
                });

                if (!hitAnyItem) playMissClickSfx();
            };
        });

        // --- 3. ระบบจับเวลา ---
        timerId = setInterval(() => {
            time--; 
            document.getElementById('timer').innerText = `⏱️ ${time}`;
            
            // เสียงหัวใจเต้นตอนเวลาใกล้หมด
            if (time <= 5 && time > 0) {
                new Audio('sounds/heartbeat.mp3').play();
            }

            if(time <= 0) {
                clearInterval(timerId);
                triggerTransition();
            }
        }, 1000);

        function checkRoomComplete() {
            const foundCount = document.querySelectorAll('.item-icon.found').length;
            if (foundCount === roomData.items.length) {
                clearInterval(timerId);
                setTimeout(triggerTransition, 300);
            }
        }

        // เอฟเฟกต์เมื่อกดผิด (กรี๊ดสั้น + จอสั่นแดง)
        function playMissClickSfx() {
            const screamSfx = new Audio('sounds/ghost_scream.mp3');
            screamSfx.playbackRate = 1.5;
            screamSfx.play().catch(e => {});
            setTimeout(() => { screamSfx.pause(); }, 400);

            const container = document.getElementById('game-container');
            container.classList.add('shake-effect', 'error-flash');
            setTimeout(() => {
                container.classList.remove('shake-effect', 'error-flash');
            }, 300);
        }

        // เอฟเฟกต์เปลี่ยนห้อง (สั่นแรง + วูบดับ + เสียงหัวเราะ)
        function triggerTransition() {
            const laughSfx = new Audio('sounds/ghost_laugh.mp3');
            laughSfx.play();

            const overlay = document.getElementById('transition-overlay');
            const container = document.getElementById('game-container');
            container.classList.add('shake-effect');
            overlay.style.opacity = "1";

            setTimeout(() => {
                // ถ้าเป็นด่านสุดท้ายให้หยุดเพลงประกอบก่อนไปหน้า Puzzle
                if (roomId >= 3) {
                    bgm.pause();
                    sessionStorage.removeItem('bgm_currentTime');
                }
                window.location.href = (roomId < 3) ? `room.html?id=${roomId+1}` : `puzzle.html`;
            }, 1000);
        }
    </script>
</body>
</html>
