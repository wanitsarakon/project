<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แม่ไม้มวยไทย: จำแล้วจับคู่</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<audio id="npcAudio" src="sounds/npc_voice.mp3" preload="auto"></audio>
<audio id="countdownAudio" src="sounds/321.mp3" preload="auto"></audio>
<audio id="startGo" src="sounds/start_go.mp3" preload="auto"></audio>
<audio id="bgMusic" src="sounds/bg_music.mp3" loop preload="auto"></audio>

<div id="startScreen" class="modal-overlay" style="display: flex;">
    <div class="npc-container">
        <img src="images/npc.png" alt="NPC" class="npc-character">
    </div>
    <div class="start-board">
        <div class="speech-bubble" id="npcSpeech">
            </div>

        <div class="start-content-wrapper">
            <h1 class="start-title">ด่านเกมจำท่ามวยไทย</h1>
            <button class="btn-green-start" onclick="startGame()">เริ่มเล่นเกม</button>
        </div>
    </div>
</div>

<div id="countdownOverlay" class="modal-overlay" style="display: none; background: rgba(0,0,0,0.7); z-index: 2000;">
    <div id="countdownNumber"></div>
</div>

<div id="resultModal" class="modal-overlay">
    <div class="start-board result-board">
        <h2 id="resultMessage" class="start-title">สรุปผลการแข่งขัน</h2>
        <div class="final-score-box">
            <span id="finalScore">0</span>
            <span class="score-unit">คะแนน</span>
        </div>
    </div>
</div>

<div class="main-container">
    <div class="hud-header">
        <div class="hud-box" id="timer-box">
            <span id="timer" class="hud-value">เวลา:20</span>
        </div>
        <div class="hud-box" id="score-box">
            <span id="score" class="hud-value">คะเเนน:0</span>
        </div>
    </div>

    <div class="progress-section">
        <div class="progress-bar-container">
            <div class="progress-fill" id="progressFill" style="width: 0%;"></div>
        </div>
        <div class="progress-text">จำได้แล้ว <span id="placedCount">0</span> / 5</div>
    </div>

    <div class="instruction" id="instruction">ช่วงจดจำ: จำรูปท่าและชื่อให้แม่น!</div>

    <div class="game-board" id="board"></div>

    <div class="deck-area" id="deck" style="display: none;"></div>
</div>

<script src="game.js"></script>
</body>
</html>
